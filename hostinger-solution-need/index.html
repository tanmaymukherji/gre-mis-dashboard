<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solution Offering | Green Rural Economy</title>
  <meta name="description" content="Upload your solutions to the AskGRE platform for admin approval and publishing." />
  <link rel="stylesheet" href="https://grameee.org/shared-shell.css?v=20260531b" />
  <script src="https://grameee.org/supabase-config.js?v=20260522m" defer></script>
  <script src="https://grameee.org/shared-shell.js?v=20260531b" defer></script>
  <script src="https://grameee.org/auth.js?v=20260531b" defer></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf6ef;
      --panel: #f7fbf7;
      --surface: #ffffff;
      --border: #cfe1d1;
      --text: #153b2e;
      --muted: #5f7266;
      --brand: #2f6f44;
      --brand-dark: #235836;
      --shadow: rgba(24, 58, 39, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(217, 239, 220, 0.9), transparent 32%),
        linear-gradient(180deg, #f7fbf7 0%, var(--bg) 100%);
      color: var(--text);
    }

    body > .grameee-shell-mount {
      width: calc(100vw - 36px);
      max-width: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 18px;
    }

    .hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      box-shadow: 0 16px 40px var(--shadow);
    }

    .hero-copy {
      flex: 1 1 auto;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px;
    }

    .lang-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: rgba(245, 251, 245, 0.9);
      background: transparent;
    }

    .lang-btn.active {
      background: #ffffff;
      color: var(--brand-dark);
      box-shadow: 0 8px 20px rgba(8, 22, 12, 0.16);
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(236, 247, 237, 0.82);
    }

    h1 {
      margin: 0;
      color: #f5fbf5;
      font-size: clamp(1.7rem, 2.8vw, 2.6rem);
      line-height: 1.1;
    }

    .lede {
      margin: 8px 0 0;
      max-width: 920px;
      color: rgba(238, 248, 239, 0.9);
      font-size: 1rem;
      line-height: 1.5;
    }

    .frame-shell {
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px var(--shadow);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 780px;
      border: 0;
      background: transparent;
      display: block;
    }

    @media (max-width: 900px) {
      body > .grameee-shell-mount {
        width: calc(100vw - 24px);
      }

      .page { padding: 12px; }
      .hero { padding: 18px; border-radius: 20px; }
      iframe { height: calc(100vh - 220px); min-height: 680px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Green Rural Economy</p>
        <h1 id="heroTitle">Solution Offering</h1>
        <p class="lede" id="heroLede">Upload your solutions to the AskGRE platform. Added solutions go through an approval process and then reflect on the AskGRE surface once accepted.</p>
      </div>
      <div class="lang-switch" aria-label="Select language">
        <button type="button" class="lang-btn active" data-lang="en">English</button>
        <button type="button" class="lang-btn" data-lang="hi">Hindi</button>
      </div>
    </section>

    <section class="frame-shell">
      <iframe
        id="solutionFormFrame"
        title="GRE Solution Offering Form"
        src="https://gre.grameee.org/?sharedForm=solution&publicForm=solution&grameeeEmbed=1&formLang=en&embedVersion=20260602lang7"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </section>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const iframe = document.getElementById("solutionFormFrame");
      const iframeBaseUrl = new URL("https://gre.grameee.org/?sharedForm=solution&publicForm=solution&grameeeEmbed=1&embedVersion=20260602lang7");
      const iframeOrigin = iframeBaseUrl.origin;
      const languageButtons = [...document.querySelectorAll(".lang-btn")];
      const heroTitle = document.getElementById("heroTitle");
      const heroLede = document.getElementById("heroLede");
      const copy = {
        en: {
          title: "Solution Offering",
          lede: "Upload your solutions to the AskGRE platform. Added solutions go through an approval process and then reflect on the AskGRE surface once accepted."
        },
        hi: {
          title: "समाधान प्रस्तुति",
          lede: "अपने समाधानों को AskGRE मंच पर अपलोड करें। जोड़े गए समाधान स्वीकृति प्रक्रिया से गुजरते हैं और स्वीकार होने पर AskGRE पर दिखाई देते हैं।"
        }
      };

      function getStoredLanguage() {
        return localStorage.getItem("grameee-solution-form-lang") === "hi" ? "hi" : "en";
      }

      function buildIframeUrl(language) {
        const normalized = language === "hi" ? "hi" : "en";
        const nextUrl = new URL(iframeBaseUrl.toString());
        nextUrl.searchParams.set("formLang", normalized);
        return nextUrl.toString();
      }

      function ensureIframeLanguage(language) {
        const nextUrl = buildIframeUrl(language);
        if (iframe.src !== nextUrl) {
          iframe.src = nextUrl;
          return true;
        }
        return false;
      }

      function applyLanguage(language) {
        const normalized = language === "hi" ? "hi" : "en";
        localStorage.setItem("grameee-solution-form-lang", normalized);
        languageButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === normalized);
        });
        heroTitle.textContent = copy[normalized].title;
        heroLede.textContent = copy[normalized].lede;
        const reloaded = ensureIframeLanguage(normalized);
        if (reloaded) return;
        iframe.contentWindow?.postMessage({
          type: "grameee-form-language",
          payload: { language: normalized }
        }, iframeOrigin);
      }

      function normalizeActor(summary) {
        if (!summary || typeof summary !== "object") return null;
        return {
          id: (summary.id || "").toString().trim(),
          fullName: (summary.fullName || summary.full_name || "").toString().trim(),
          username: (summary.username || summary.user_name || "").toString().trim(),
          organization: ((summary.organization || summary.organisation || "").toString().trim()) || "Individual",
          email: (summary.email || "").toString().trim().toLowerCase(),
          phone: (summary.phone || "").toString().trim()
        };
      }

      async function getCurrentUser() {
        const stored = window.grameeeAuth?.getStoredSummary?.();
        if (stored) return normalizeActor(stored);
        const hydrated = await window.grameeeAuth?.hydrateAuthSession?.().catch(() => null);
        return normalizeActor(hydrated);
      }

      async function postContextToFrame() {
        const user = await getCurrentUser();
        iframe.contentWindow?.postMessage({
          type: "grameee-form-context",
          payload: { user, language: getStoredLanguage() }
        }, iframeOrigin);
        iframe.contentWindow?.postMessage({
          type: "grameee-form-language",
          payload: { language: getStoredLanguage() }
        }, iframeOrigin);
      }

      iframe.addEventListener("load", postContextToFrame);
      document.addEventListener("grameee:auth-updated", postContextToFrame);
      window.addEventListener("message", (event) => {
        if (event.origin !== iframeOrigin || !event.data || typeof event.data !== "object") return;
        if (event.data.type === "grameee-form-request-context") {
          postContextToFrame();
          return;
        }
        if (event.data.type === "grameee-form-require-login") {
          const authLink = document.querySelector("[data-auth-link]");
          authLink?.dispatchEvent(new MouseEvent("click", { bubbles: true, cancelable: true }));
        }
      });
      languageButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.lang || "en"));
      });
      ensureIframeLanguage(getStoredLanguage());
      applyLanguage(getStoredLanguage());
      postContextToFrame();
    });
  </script>
</body>
</html>
