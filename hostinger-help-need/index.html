<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Need Help | Green Rural Economy</title>
  <meta name="description" content="Share your help needs on the GRE platform for curation and broader ecosystem support." />
  <link rel="stylesheet" href="https://grameee.org/shared-shell.css?v=20260531b" />
  <script src="https://grameee.org/supabase-config.js?v=20260522m" defer></script>
  <script src="https://grameee.org/shared-shell.js?v=20260531b" defer></script>
  <script src="https://grameee.org/auth.js?v=20260531b" defer></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf6ef;
      --panel: #fdfefb;
      --border: #d6e4d4;
      --text: #163328;
      --muted: #5e7468;
      --hero: #2f6f45;
      --hero-text: #f7fbf5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(251, 244, 226, 0.92), transparent 28%),
        radial-gradient(circle at top right, rgba(228, 241, 231, 0.94), transparent 34%),
        linear-gradient(180deg, #f3f9f2 0%, var(--bg) 100%);
      color: var(--text);
    }

    body > .grameee-shell-mount {
      width: calc(100vw - 36px);
      max-width: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 18px;
    }

    .hero {
      background: linear-gradient(180deg, #377c4b 0%, var(--hero) 100%);
      border: 1px solid rgba(47, 111, 69, 0.18);
      border-radius: 24px;
      padding: 24px 28px;
      display: flex;
      justify-content: flex-start;
      gap: 20px;
      align-items: flex-start;
      box-shadow: 0 20px 48px rgba(31, 63, 43, 0.14);
    }

    .hero-copy {
      flex: 1 1 auto;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px;
    }

    .lang-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: rgba(247, 251, 245, 0.9);
      background: transparent;
    }

    .lang-btn.active {
      background: #ffffff;
      color: var(--hero);
      box-shadow: 0 8px 20px rgba(8, 22, 12, 0.16);
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(241, 249, 238, 0.86);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.8vw, 2.6rem);
      line-height: 1.1;
      color: var(--hero-text);
    }

    .lede {
      margin: 8px 0 0;
      max-width: 920px;
      color: rgba(247, 251, 245, 0.94);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .frame-shell {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(39, 53, 37, 0.09);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 780px;
      border: 0;
      background: transparent;
      display: block;
    }

    @media (max-width: 900px) {
      body > .grameee-shell-mount {
        width: calc(100vw - 24px);
      }

      .page { padding: 12px; }
      .hero { padding: 20px; border-radius: 20px; }
      iframe { height: calc(100vh - 220px); min-height: 680px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Green Rural Economy</p>
        <h1 id="heroTitle">Need Help</h1>
        <p class="lede" id="heroLede">Share your needs on the GRE platform. Submitted needs go through an internal review process and then flow into the GRE MIS workflow for solution matching, curation support, and broader ecosystem outreach when needed.</p>
      </div>
      <div class="lang-switch" aria-label="Select language">
        <button type="button" class="lang-btn active" data-lang="en">English</button>
        <button type="button" class="lang-btn" data-lang="hi">Hindi</button>
      </div>
    </section>

    <section class="frame-shell">
      <iframe
        id="needFormFrame"
        title="GRE Need Help Form"
        src="https://gre.grameee.org/?sharedForm=need&publicForm=need&grameeeEmbed=1&formLang=en&embedVersion=20260602lang7"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </section>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const iframe = document.getElementById("needFormFrame");
      const iframeBaseUrl = new URL("https://gre.grameee.org/?sharedForm=need&publicForm=need&grameeeEmbed=1&embedVersion=20260602lang7");
      const iframeOrigin = iframeBaseUrl.origin;
      const languageButtons = [...document.querySelectorAll(".lang-btn")];
      const heroTitle = document.getElementById("heroTitle");
      const heroLede = document.getElementById("heroLede");
      const copy = {
        en: {
          title: "Need Help",
          lede: "Share your needs on the GRE platform. Submitted needs go through an internal review process and then flow into the GRE MIS workflow for solution matching, curation support, and broader ecosystem outreach when needed."
        },
        hi: {
          title: "मदद चाहिए",
          lede: "अपनी जरूरतें GRE मंच पर साझा करें। जमा की गई जरूरतें आंतरिक समीक्षा से गुजरती हैं और फिर समाधान मिलान, क्यूरेशन सहयोग और व्यापक इकोसिस्टम संपर्क के लिए GRE MIS प्रक्रिया में प्रवाहित होती हैं।"
        }
      };

      function getStoredLanguage() {
        return localStorage.getItem("grameee-help-form-lang") === "hi" ? "hi" : "en";
      }

      function buildIframeUrl(language) {
        const normalized = language === "hi" ? "hi" : "en";
        const nextUrl = new URL(iframeBaseUrl.toString());
        nextUrl.searchParams.set("formLang", normalized);
        return nextUrl.toString();
      }

      function ensureIframeLanguage(language) {
        const nextUrl = buildIframeUrl(language);
        if (iframe.src !== nextUrl) {
          iframe.src = nextUrl;
          return true;
        }
        return false;
      }

      function applyLanguage(language) {
        const normalized = language === "hi" ? "hi" : "en";
        localStorage.setItem("grameee-help-form-lang", normalized);
        languageButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === normalized);
        });
        heroTitle.textContent = copy[normalized].title;
        heroLede.textContent = copy[normalized].lede;
        const reloaded = ensureIframeLanguage(normalized);
        if (reloaded) return;
        iframe.contentWindow?.postMessage({
          type: "grameee-form-language",
          payload: { language: normalized }
        }, iframeOrigin);
      }

      function normalizeValue(value) {
        return (value || "").trim();
      }

      function normalizeActor(summary) {
        if (!summary || typeof summary !== "object") return null;
        return {
          id: normalizeValue(summary.id),
          fullName: normalizeValue(summary.fullName || summary.full_name || ""),
          username: normalizeValue(summary.username || summary.user_name || ""),
          organization: normalizeValue(summary.organization || summary.organisation || "") || "Individual",
          email: normalizeValue(summary.email).toLowerCase(),
          phone: normalizeValue(summary.phone || "")
        };
      }

      async function getCurrentUser() {
        const stored = window.grameeeAuth?.getStoredSummary?.();
        if (stored) return normalizeActor(stored);
        const hydrated = await window.grameeeAuth?.hydrateAuthSession?.().catch(() => null);
        return normalizeActor(hydrated);
      }

      async function postContextToFrame() {
        const user = await getCurrentUser();
        iframe.contentWindow?.postMessage({
          type: "grameee-form-context",
          payload: { user, language: getStoredLanguage() }
        }, iframeOrigin);
        iframe.contentWindow?.postMessage({
          type: "grameee-form-language",
          payload: { language: getStoredLanguage() }
        }, iframeOrigin);
      }

      iframe.addEventListener("load", postContextToFrame);
      document.addEventListener("grameee:auth-updated", postContextToFrame);
      window.addEventListener("message", (event) => {
        if (event.origin !== iframeOrigin || !event.data || typeof event.data !== "object") return;
        if (event.data.type === "grameee-form-request-context") {
          postContextToFrame();
          return;
        }
        if (event.data.type === "grameee-form-require-login") {
          const authLink = document.querySelector("[data-auth-link]");
          authLink?.dispatchEvent(new MouseEvent("click", { bubbles: true, cancelable: true }));
        }
      });
      languageButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.lang || "en"));
      });
      ensureIframeLanguage(getStoredLanguage());
      applyLanguage(getStoredLanguage());
      postContextToFrame();
    });
  </script>
</body>
</html>
