<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRE Offering Detail</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=20260508a"></script>
  <link rel="stylesheet" href="./styles.css?v=20260508a" />
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div class="brand-block">
        <img src="./assets/gre-logo.png" alt="GRE logo" class="brand-logo" />
        <div class="brand-copy">
          <p class="eyebrow">GRE Knowledge Match</p>
          <h1>Offering Detail</h1>
          <p class="lede">Detailed provider, solution, and offering view for the selected GRE match.</p>
        </div>
      </div>
      <div class="masthead-account-panel">
        <div class="hero-account-inline masthead-account-inline">
          <button type="button" class="btn btn-secondary btn-compact" onclick="window.close()">Close Tab</button>
        </div>
      </div>
    </header>

    <main>
      <section class="panel panel-detail">
        <div id="offeringDetailMount" class="empty-state">Loading offering details…</div>
      </section>
    </main>
  </div>

  <script type="module">
    const APP_CONFIG = window.APP_CONFIG || {};
    const mount = document.getElementById("offeringDetailMount");
    const params = new URLSearchParams(window.location.search);
    const offeringId = params.get("offering_id");

    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;",
    }[char]));

    const normalizeText = (value) => value === null || value === undefined ? "" : String(value).trim();
    const parseArray = (value) => Array.isArray(value) ? value.filter(Boolean) : typeof value === "string" ? value.split(/[;,|]/).map((item) => item.trim()).filter(Boolean) : [];

    function renderDetail(match) {
      const description = normalizeText(match.about_offering_text || match.solution?.about_solution_text || "No detailed description is available yet.");
      mount.innerHTML = `
        <div class="need-detail-stack selected-need-layout">
          <section class="need-overview-card">
            <div class="need-overview-head">
              <div>
                <p class="eyebrow">${esc(match.offering_category || "GRE Offering")}</p>
                <h3>${esc(match.offering_name || match.solution?.solution_name || "Unnamed offering")}</h3>
                <p class="helper-text">${esc(match.trader?.organisation_name || match.trader?.trader_name || "Provider not mapped")}</p>
              </div>
              <div class="status-row">
                <span class="status-pill info">${esc(match.offering_group || "Offering")}</span>
                <span class="status-pill match-score-pill">${esc(match.ai_offering_kind || "Structured GRE Detail")}</span>
              </div>
            </div>
            <div class="tag-row">
              ${parseArray(match.tags).map((tag) => `<span>${esc(tag)}</span>`).join("")}
            </div>
          </section>

          <div class="selected-need-grid">
            <article class="detail-card detail-stack-card">
              <h4>Provider</h4>
              <div class="kv-grid">
                <div><span>Organisation</span><strong>${esc(match.trader?.organisation_name || match.trader?.trader_name || "Not set")}</strong></div>
                <div><span>Email</span><strong>${esc(match.trader?.email || "Not set")}</strong></div>
                <div><span>Website</span><strong>${esc(match.trader?.website || "Not set")}</strong></div>
                <div><span>GRE Link</span><strong>${match.gre_link ? `<a href="${esc(match.gre_link)}" target="_blank" rel="noreferrer">Open on GRE</a>` : "Not available"}</strong></div>
              </div>
            </article>

            <article class="detail-card detail-stack-card">
              <h4>Offering Structure</h4>
              <div class="kv-grid">
                <div><span>Offering Group</span><strong>${esc(match.offering_group || "Not set")}</strong></div>
                <div><span>Offering Type</span><strong>${esc(match.offering_type || "Not set")}</strong></div>
                <div><span>Primary Application</span><strong>${esc(match.primary_application || "Not set")}</strong></div>
                <div><span>Primary Value Chain</span><strong>${esc(match.primary_valuechain || "Not set")}</strong></div>
                <div><span>Application Area</span><strong>${esc(match.ai_application_area || "Not set")}</strong></div>
                <div><span>Offering Kind</span><strong>${esc(match.ai_offering_kind || "Not set")}</strong></div>
              </div>
            </article>

            <article class="detail-card detail-stack-card">
              <h4>Coverage</h4>
              <div class="kv-grid">
                <div><span>Geographies</span><strong>${esc(parseArray(match.geographies).join(", ") || "Not listed")}</strong></div>
                <div><span>Applications</span><strong>${esc(parseArray(match.applications).join(", ") || "Not listed")}</strong></div>
                <div><span>Value Chains</span><strong>${esc(parseArray(match.valuechains).join(", ") || "Not listed")}</strong></div>
                <div><span>6M</span><strong>${esc(match.domain_6m || "Not listed")}</strong></div>
              </div>
            </article>
          </div>

          <article class="detail-card detail-stack-card">
            <h4>Solution Context</h4>
            <div class="kv-grid">
              <div><span>Solution Name</span><strong>${esc(match.solution?.solution_name || "Not mapped")}</strong></div>
              <div><span>Contact Details</span><strong>${esc(match.contact_details || "Not listed")}</strong></div>
            </div>
          </article>

          <article class="detail-card detail-stack-card">
            <h4>Full Description</h4>
            <p class="detail-note">${esc(description)}</p>
          </article>
        </div>
      `;
    }

    async function loadFromSupabase() {
      if (!APP_CONFIG.SUPABASE_URL || !APP_CONFIG.SUPABASE_ANON_KEY || !window.supabase?.createClient) {
        throw new Error("Supabase is not configured.");
      }
      const client = window.supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_ANON_KEY);
      const offeringSelect = "offering_id,solution_id,trader_id,offering_name,offering_category,offering_group,offering_type,primary_application,primary_valuechain,applications,valuechains,domain_6m,tags,geographies,about_offering_text,contact_details,gre_link,ai_thematic_area,ai_application_area,ai_offering_kind,ai_service_kind,ai_keywords";
      const { data: offering, error } = await client.from("offerings").select(offeringSelect).eq("offering_id", offeringId).maybeSingle();
      if (error) throw new Error(error.message);
      if (!offering) throw new Error("Offering not found.");

      const [traderRes, solutionRes] = await Promise.all([
        offering.trader_id ? client.from("traders").select("trader_id,trader_name,organisation_name,email,website").eq("trader_id", offering.trader_id).maybeSingle() : Promise.resolve({ data: null }),
        offering.solution_id ? client.from("solutions").select("solution_id,solution_name,about_solution_text").eq("solution_id", offering.solution_id).maybeSingle() : Promise.resolve({ data: null }),
      ]);

      return {
        ...offering,
        trader: traderRes.data || null,
        solution: solutionRes.data || null,
      };
    }

    async function init() {
      if (!offeringId) {
        mount.innerHTML = `<div class="empty-state">No offering id was provided.</div>`;
        return;
      }
      try {
        const cached = sessionStorage.getItem(`gre-match-${offeringId}`);
        if (cached) {
          renderDetail(JSON.parse(cached));
          return;
        }
      } catch {}

      try {
        const match = await loadFromSupabase();
        renderDetail(match);
      } catch (error) {
        mount.innerHTML = `<div class="empty-state">${esc(error.message || "Could not load offering details.")}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
