<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRE Offering Detail</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://grameee.org/supabase-config.js?v=20260519gre1"></script>
  <script src="https://grameee.org/auth.js?v=20260614a" defer></script>
  <script src="./config.js?v=20260508c"></script>
  <style>
    :root {
      --bg: #f4f7f1;
      --panel: #ffffff;
      --ink: #1f2b1f;
      --muted: #5e6d5e;
      --line: rgba(45, 85, 54, 0.14);
      --green: #2e6a3c;
      --green-soft: rgba(46, 106, 60, 0.12);
      --shadow: 0 18px 40px rgba(28, 62, 36, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7fbf4, #eef4ea);
      color: var(--ink);
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    .grameee-site-header {
      width: min(1280px, calc(100vw - 32px));
      margin: 24px auto 0;
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 12px;
      z-index: 40;
      background: rgba(247, 252, 247, 0.84);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 22px;
      box-shadow: 0 10px 26px rgba(36, 73, 45, 0.08);
    }
    .grameee-brand {
      display: inline-flex;
      flex-direction: column;
      color: #173b36;
      max-width: 320px;
    }
    .grameee-brand strong {
      display: block;
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 1rem;
    }
    .grameee-brand small {
      display: block;
      color: #5e746a;
      font-size: 0.82rem;
    }
    .grameee-site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      font-size: 0.95rem;
      color: #5e746a;
      align-items: center;
    }
    .grameee-site-nav a:hover,
    .grameee-site-nav a:focus-visible,
    .grameee-user-trigger:hover,
    .grameee-user-trigger:focus-visible {
      color: #1f5b37;
    }
    .grameee-user-menu { position: relative; }
    .grameee-user-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      list-style: none;
      cursor: pointer;
      color: #1f5b37;
      font-weight: 600;
    }
    .grameee-user-trigger::-webkit-details-marker { display: none; }
    .grameee-user-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 220px;
      padding: 10px;
      display: grid;
      gap: 6px;
      border-radius: 16px;
      background: rgba(247, 252, 247, 0.98);
      border: 1px solid rgba(36, 73, 45, 0.1);
      box-shadow: 0 14px 28px rgba(36, 73, 45, 0.12);
      z-index: 45;
    }
    .grameee-user-action {
      appearance: none;
      border: none;
      background: none;
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      font: inherit;
      color: #22313f;
      cursor: pointer;
    }
    .grameee-user-action:hover,
    .grameee-user-action:focus-visible {
      background: #eef6ef;
      color: #1f5b37;
    }
    .page-shell {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 24px 28px;
    }
    .detail-hero-top,
    .page-bottom-actions,
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .detail-hero-top {
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3vw, 2.75rem);
      line-height: 1.08;
    }
    .detail-hero-actions-left {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .detail-hero-back {
      margin-left: auto;
    }
    .detail-hero-main {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 20px;
    }
    .detail-hero-copy {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 260px;
      padding: 22px 24px;
      border: 1px solid rgba(31, 43, 30, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
    }
    .detail-hero-copy h1 {
      color: #182717;
    }
    .detail-hero-image-wrap {
      flex: 0 0 300px;
      width: 300px;
      min-height: 260px;
      height: auto;
      padding: 18px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(31, 43, 30, 0.08);
      background: rgba(255, 255, 255, 0.76);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-hero-image {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }
    .detail-stack {
      display: grid;
      gap: 20px;
    }
    .hero-copy,
    .section-copy,
    .notice {
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
      gap: 22px;
      margin-top: 24px;
      align-items: start;
    }
    .stack {
      display: grid;
      gap: 22px;
    }
    .panel-pad {
      padding: 24px 26px;
    }
    .section-title {
      margin: 0 0 8px;
      font-size: 1.24rem;
    }
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }
    .detail-table th,
    .detail-table td {
      text-align: left;
      vertical-align: top;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .detail-table th {
      width: 34%;
      color: var(--muted);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding-right: 18px;
    }
    .detail-table td {
      font-size: 0.98rem;
      line-height: 1.55;
    }
    .detail-table tr:last-child th,
    .detail-table tr:last-child td {
      border-bottom: none;
    }
    .btn,
    .result-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(46, 106, 60, 0.18);
      background: #fff;
      color: var(--green);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.hero-link {
      color: var(--ink);
    }
    .result-link {
      min-height: auto;
      padding: 8px 12px;
    }
    .page-bottom-actions {
      margin-top: 22px;
      justify-content: flex-start;
    }
    .empty {
      min-height: 280px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .offering-action-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.82fr) minmax(220px, 280px);
      gap: 24px;
      align-items: center;
      padding: clamp(24px, 3vw, 38px);
      border-radius: 30px;
      background:
        radial-gradient(circle at 76% 12%, rgba(226, 184, 80, 0.18), transparent 32%),
        linear-gradient(135deg, #063f2c 0%, #0f6040 52%, #063322 100%);
      color: #fffaf0;
      box-shadow: 0 24px 60px rgba(18, 61, 42, 0.24);
    }
    .offering-hero-no-media {
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.42fr);
    }
    .offering-hero-copy h1 {
      margin: 0;
      font-size: clamp(2.1rem, 4vw, 3.7rem);
      line-height: 1.02;
      letter-spacing: -0.045em;
      color: #fffaf0;
    }
    .offering-hero-copy p {
      margin: 16px 0 0;
      color: rgba(255, 252, 245, 0.9);
      font-size: 1.05rem;
      line-height: 1.55;
    }
    .offering-hero-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .offering-page-kicker {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .offering-hero-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #fffdf4;
      font-weight: 850;
    }
    .offering-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .offering-chip-row span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(232, 247, 236, 0.94);
      color: #174735;
      font-size: 0.82rem;
      font-weight: 800;
    }
    .offering-chip-row span:first-child,
    .offering-service .offering-chip-row span:nth-child(2),
    .offering-knowledge .offering-chip-row span:nth-child(2) {
      background: #e4b850;
      color: #173121;
    }
    .offering-hero-media {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(126px, 150px);
      gap: 18px;
      align-items: stretch;
    }
    .offering-hero-image-card,
    .offering-hero-doc-card {
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 18px;
      background: rgba(255, 250, 240, 0.96);
      color: #173121;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.14);
    }
    .offering-hero-image-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 0;
      object-fit: cover;
    }
    .offering-hero-image-card figcaption {
      padding: 12px 14px;
      color: #33483b;
      font-weight: 700;
    }
    .offering-hero-doc-card {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 9px;
      min-height: 180px;
      padding: 18px;
      text-align: center;
    }
    .offering-hero-doc-card span,
    .offering-document-icon,
    .offering-featured-resource span {
      display: grid;
      place-items: center;
      width: 54px;
      height: 62px;
      border-radius: 14px;
      background: #dff2e4;
      color: #177044;
      font-weight: 900;
      font-size: 0.78rem;
    }
    .offering-hero-actions {
      display: grid;
      gap: 14px;
      justify-self: end;
      width: 100%;
    }
    .offering-hero-no-media .offering-hero-actions {
      width: min(100%, 520px);
    }
    .offering-cta {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(23, 49, 33, 0.12);
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }
    .offering-cta-primary {
      background: linear-gradient(135deg, #df9f24 0%, #f1c85f 52%, #f8dc83 100%);
      border-color: rgba(99, 59, 8, 0.22);
      color: #173121;
      box-shadow: 0 18px 34px rgba(86, 61, 14, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }
    .offering-cta-secondary {
      background: #fffdf8;
      color: #15533a;
    }
    .offering-cta-soft {
      background: #e7f4e8;
      color: #15533a;
    }
    .offering-cta-outline {
      background: rgba(255, 250, 240, 0.08);
      color: #fffaf0;
      border-color: rgba(255, 250, 240, 0.42);
    }
    .offering-featured-media,
    .offering-summary-card,
    .offering-tabs-card,
    .offering-quick-card {
      border: 1px solid rgba(33, 92, 61, 0.14);
      background: rgba(255, 251, 243, 0.92);
      box-shadow: 0 16px 42px rgba(47, 56, 42, 0.1);
    }
    .offering-featured-media {
      display: grid;
      gap: 22px;
      margin: 24px 0;
      padding: clamp(22px, 3vw, 34px);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 253, 248, 0.96), rgba(232, 244, 232, 0.88));
    }
    .offering-section-kicker {
      margin: 0 0 8px;
      color: #2b7046;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .offering-featured-media h2,
    .offering-summary-card h2 {
      margin: 0;
      color: #173121;
    }
    .offering-featured-media-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 22px;
    }
    .offering-featured-player {
      min-height: 320px;
      border-radius: 24px;
      overflow: hidden;
      background: #092c20;
    }
    .offering-featured-player iframe,
    .offering-featured-player video {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 320px;
      border: 0;
      object-fit: cover;
    }
    .offering-external-media-card {
      display: flex;
      min-height: 320px;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: clamp(24px, 4vw, 44px);
      color: #fffdf4;
      background: linear-gradient(135deg, #0f4a34, #08281e);
    }
    .offering-external-media-card span {
      color: #f2cf72;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }
    .offering-external-media-card strong {
      font-size: clamp(1.8rem, 3vw, 3.2rem);
      line-height: 1.02;
    }
    .offering-featured-resource-list,
    .offering-document-grid,
    .offering-media-grid,
    .offering-tab-card-grid {
      display: grid;
      gap: 14px;
    }
    .offering-featured-resource,
    .offering-document-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(33, 92, 61, 0.16);
      border-radius: 20px;
      background: #fffdf8;
      color: #173121;
    }
    .offering-featured-image-link {
      grid-template-columns: 70px minmax(0, 1fr);
    }
    .offering-featured-image-link img {
      width: 70px;
      height: 54px;
      border-radius: 12px;
      object-fit: cover;
    }
    .offering-quick-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .offering-quick-card {
      min-height: 104px;
      padding: 22px 20px;
      border-radius: 18px;
    }
    .offering-quick-card span {
      display: block;
      margin-bottom: 8px;
      color: #647267;
      font-size: 0.88rem;
    }
    .offering-quick-card strong {
      display: block;
      color: #177044;
      font-size: clamp(1.05rem, 1.5vw, 1.32rem);
      line-height: 1.2;
    }
    .offering-summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 20px;
      margin-top: 24px;
    }
    .offering-summary-card,
    .offering-tabs-card {
      border-radius: 24px;
      padding: 28px;
    }
    .offering-help-list {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }
    .offering-help-list div {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .offering-help-list span {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #e0f4e6;
      color: #177044;
      font-weight: 900;
    }
    .offering-help-list p {
      margin: 3px 0 0;
      color: #33483b;
      line-height: 1.5;
    }
    .offering-snapshot-rows div,
    .offering-detail-row {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 16px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(31, 43, 30, 0.1);
    }
    .offering-snapshot-rows span,
    .offering-detail-row span {
      color: #647267;
      font-weight: 700;
    }
    .offering-snapshot-rows strong,
    .offering-detail-row strong,
    .offering-snapshot-rows a {
      color: #174735;
      line-height: 1.35;
      word-break: break-word;
    }
    .offering-tabs-card {
      margin-top: 24px;
      padding: 24px;
    }
    .offering-tab-list {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      border-bottom: 1px solid rgba(31, 43, 30, 0.12);
      padding-bottom: 14px;
    }
    .offering-tab-button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(246, 238, 221, 0.78);
      color: #174735;
      font-weight: 800;
      cursor: pointer;
    }
    .offering-tab-button.active {
      background: #23734d;
      color: #fffaf0;
    }
    .offering-tab-panel {
      padding: 24px 0 4px;
    }
    .offering-tab-card-grid,
    .offering-media-grid,
    .offering-document-grid {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      margin-top: 18px;
    }
    .offering-tab-info-card,
    .offering-media-card {
      padding: 18px;
      border: 1px solid rgba(31, 43, 30, 0.1);
      border-radius: 18px;
      background: #fffdf8;
      color: #174735;
    }
    .offering-media-card img,
    .offering-media-card video,
    .offering-media-card iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 0;
      border-radius: 14px;
      object-fit: cover;
      background: rgba(31, 43, 30, 0.06);
    }
    .offering-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #e6f4e8;
      color: #174735;
    }
    @media (max-width: 920px) {
      .grameee-site-header {
        width: min(100vw - 20px, 1280px);
        padding: 14px 16px;
        flex-direction: column;
        align-items: flex-start;
      }
      .grameee-site-nav {
        gap: 14px;
      }
      .page-shell {
        width: min(100vw - 20px, 1280px);
        padding: 16px 0 30px;
      }
      .detail-grid {
        grid-template-columns: 1fr;
      }
      .detail-hero-main {
        flex-direction: column;
      }
      .detail-hero-copy {
        min-height: 0;
        padding: 20px;
      }
      .detail-hero-top {
        flex-direction: column-reverse;
        align-items: stretch;
      }
      .detail-hero-actions-left {
        width: 100%;
      }
      .detail-hero-back {
        margin-left: 0;
        align-self: flex-end;
      }
      .detail-hero-image-wrap {
        width: 100%;
        max-width: none;
        min-height: 240px;
        height: 240px;
      }
      .detail-hero-top {
        justify-content: flex-start;
      }
      .detail-table th,
      .detail-table td {
        display: block;
        width: 100%;
      }
      .detail-table th {
        padding-bottom: 4px;
        border-bottom: none;
      }
      .detail-table td {
        padding-top: 0;
      }
      .offering-action-hero,
      .offering-hero-no-media,
      .offering-featured-media-grid,
      .offering-summary-grid {
        grid-template-columns: 1fr;
      }
      .offering-hero-media {
        grid-template-columns: minmax(0, 1fr) minmax(130px, 170px);
      }
      .offering-hero-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .offering-quick-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .offering-tab-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .offering-detail-row,
      .offering-snapshot-rows div {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
    @media (max-width: 640px) {
      .offering-action-hero {
        padding: 20px;
        border-radius: 24px;
      }
      .offering-hero-topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .offering-hero-media,
      .offering-hero-actions,
      .offering-quick-grid,
      .offering-tab-list {
        grid-template-columns: 1fr;
      }
      .offering-featured-player,
      .offering-featured-player iframe,
      .offering-featured-player video,
      .offering-external-media-card {
        min-height: 240px;
      }
    }
    body.embedded-offering-detail {
      background: #fff;
    }
    body.embedded-offering-detail .grameee-site-header,
    body.embedded-offering-detail .page-bottom-actions {
      display: none;
    }
    body.embedded-offering-detail .page-shell {
      width: 100%;
      margin: 0;
      padding: 0;
    }
    body.embedded-offering-detail .hero,
    body.embedded-offering-detail .panel {
      border-radius: 0;
      box-shadow: none;
      border-left: 0;
      border-right: 0;
    }
    body.embedded-offering-detail .hero {
      border-top: 0;
    }
    body.embedded-offering-detail .offering-action-hero {
      border-radius: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <header class="grameee-site-header">
    <a class="grameee-brand" href="https://grameee.org/">
      <strong>GramEEE</strong>
      <small>Gram Eco Entrepreneur Ecosystem</small>
    </a>
    <nav class="grameee-site-nav" aria-label="GramEEE">
      <a href="https://grameee.org/">About</a>
      <a href="https://grameee.org/tools.html">Tools</a>
      <a class="auth-only-link" data-privilege="ecosystem" href="https://ecosystem.grameee.org/" hidden>Eco System</a>
      <a class="auth-only-link" data-privilege="askGre" href="https://askgre.grameee.org/" hidden>Ask GRE</a>
      <a class="auth-only-link" data-privilege="offerSolutions" href="https://solution.grameee.org/" hidden>Offer Solutions</a>
      <a class="auth-only-link" data-privilege="askHelp" href="https://help.grameee.org/" hidden>Ask Help</a>
      <a class="auth-only-link" data-privilege="needsMap" href="https://needs.grameee.org/" hidden>Needs Map</a>
      <a class="auth-only-link" href="https://place.grameee.org/" hidden>Place</a>
      <a class="auth-only-link" data-privilege="gre" href="https://gre.grameee.org/" hidden>GRE</a>
      <a data-auth-link href="https://grameee.org/login.html">Login</a>
    </nav>
  </header>
  <main class="page-shell">
    <div id="offeringDetailMount" class="hero empty">Loading offering details…</div>
  </main>

  <script type="module">
    const APP_CONFIG = window.APP_CONFIG || {};
    const mount = document.getElementById("offeringDetailMount");
    const params = new URLSearchParams(window.location.search);
    const offeringId = params.get("offering_id");
    const isEmbedded = params.get("embedded") === "1";

    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;",
    }[char]));

    const normalizeText = (value) => value === null || value === undefined ? "" : String(value).trim();
    const parseArray = (value) => Array.isArray(value) ? value.filter(Boolean) : typeof value === "string" ? value.split(/[;,|]/).map((item) => item.trim()).filter(Boolean) : [];
    const formatValue = (value) => {
      if (Array.isArray(value)) {
        return value.filter(Boolean).join(", ");
      }
      return String(value || "").trim();
    };
    const isPresent = (value) => formatValue(value).length > 0;
    const isLinkValue = (value) => {
      const text = String(value || "").trim().toLowerCase();
      return text.startsWith("http://") || text.startsWith("https://") || text.startsWith("data:");
    };
    const parseContactDetailParts = (value) => {
      const text = normalizeText(value);
      if (!text) return { text: "", name: "", email: "", phone: "" };
      const emailMatch = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
      const phoneMatch = text.match(/(?:\+?\d[\d\s().-]{7,}\d)/);
      const lines = text.split(/\r?\n|[,;|]/).map((item) => normalizeText(item)).filter(Boolean);
      const firstLine = lines[0] || "";
      const looksLikeName = firstLine && !/@/.test(firstLine) && !/\d{5,}/.test(firstLine);
      return {
        text,
        name: looksLikeName ? firstLine : "",
        email: emailMatch ? emailMatch[0] : "",
        phone: phoneMatch ? phoneMatch[0].trim() : "",
      };
    };

    function buildRow(label, value, forceLink = false) {
      const clean = formatValue(value);
      if (!clean) return "";
      const renderAsLink = forceLink || isLinkValue(value);
      return `<tr><th>${esc(label)}</th><td>${renderAsLink ? `<a class="result-link" href="${esc(clean)}" target="_blank" rel="noreferrer">Open link</a>` : esc(clean)}</td></tr>`;
    }

    function buildOfferingRows(match) {
      const primaryRows = [
        ["Offering Category", match.offering_category],
        ["Offering Group", match.offering_group],
        ["Offering Type", match.offering_type],
        ["6M Domain", match.domain_6m],
        ["Primary Value Chain", match.primary_valuechain],
        ["Primary Application", match.primary_application],
        ["All Value Chains", parseArray(match.valuechains)],
        ["All Applications", parseArray(match.applications)],
        ["Tags", parseArray(match.tags)],
        ["Languages", parseArray(match.languages)],
        ["Geography", parseArray(match.geographies)],
        ["Location Availability", match.location_availability],
        ["Audience", match.audience]
      ];

      const secondaryRows = [
        ["Contact Details", match.preferred_contact_details || match.contact_details]
      ];

      const serviceRows = [
        ["Trainer Name", match.trainer_name],
        ["Trainer Email", match.trainer_email],
        ["Trainer Phone", match.trainer_phone],
        ["Trainer Details", match.trainer_details_text],
        ["Duration", match.duration],
        ["Prerequisites", match.prerequisites],
        ["Service Cost", match.service_cost],
        ["Support Post Service", match.support_post_service],
        ["Support Post Service Cost", match.support_post_service_cost],
        ["Delivery Mode", match.delivery_mode],
        ["Certification Offered", match.certification_offered],
        ["Cost Remarks", match.cost_remarks],
        ["Service Brochure", match.service_brochure_url || match.product_brochure_url]
      ];

      const productRows = [
        ["Grade or Capacity", match.grade_capacity || match.grade_or_capacity || match.capacity],
        ["Product Cost", match.product_cost || match.cost],
        ["Lead Time", match.lead_time],
        ["Support Details", match.support_details],
        ["Cost Remarks", match.cost_remarks],
        ["Product Brochure", match.product_brochure_url]
      ];

      const knowledgeRows = [
        ["Delivery Mode", match.delivery_mode],
        ["Duration", match.duration],
        ["Prerequisites", match.prerequisites],
        ["Certification Offered", match.certification_offered],
        ["Knowledge Content", match.knowledge_content_url]
      ];

      const group = normalizeText(match.offering_group).toLowerCase();
      const category = normalizeText(match.offering_category).toLowerCase();
      const relevantRows =
        (group === "service" || category.includes("service")) ? serviceRows :
        (group === "product" || category.includes("product")) ? productRows :
        (group === "knowledge" || category.includes("knowledge")) ? knowledgeRows :
        [];

      return {
        primaryRows: primaryRows.filter(([, value]) => isPresent(value)),
        secondaryRows: [...secondaryRows, ...relevantRows].filter(([, value]) => isPresent(value))
      };
    }

    function buildProviderRows(match) {
      const trader = match.solution?.trader || match.trader || null;
      return [
        ["Solution Name", match.solution?.solution_name],
        ["Provider", trader?.organisation_name || trader?.trader_name],
        ["Association Status", trader?.association_status],
        ["Email", match.preferred_contact_email || trader?.email],
        ["Website", trader?.website],
        ["Phone", match.preferred_contact_phone || trader?.mobile],
        ["Point of Contact", match.preferred_contact_name || trader?.poc_name],
        ["Contact Details", match.preferred_contact_details || match.contact_details],
        ["Tagline", trader?.tagline],
        ["Short Description", trader?.short_description]
      ].filter(([, value]) => isPresent(value));
    }

    function uniqueValues(values) {
      const seen = new Set();
      return values.flatMap((value) => {
        if (Array.isArray(value)) return value;
        return normalizeText(value).split(/[;,|\n]/);
      }).map((value) => normalizeText(value)).filter((value) => {
        if (!value) return false;
        const key = value.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function getPayload(match) {
      const raw = match?.raw_payload && typeof match.raw_payload === "object" ? match.raw_payload : {};
      const nested = raw?.payload && typeof raw.payload === "object" ? raw.payload : {};
      const solutionRaw = match?.solution?.raw_payload && typeof match.solution.raw_payload === "object" ? match.solution.raw_payload : {};
      return { ...solutionRaw, ...raw, ...nested };
    }

    function getAttachmentUrl(value) {
      if (typeof value === "string") return value;
      if (value && typeof value === "object") {
        return normalizeText(value.dataUrl || value.url || value.href || value.link);
      }
      return "";
    }

    function collectResourceValues(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.flatMap(collectResourceValues);
      if (typeof value === "object") {
        const direct = getAttachmentUrl(value);
        const nested = Object.values(value).flatMap(collectResourceValues);
        return direct ? [direct, ...nested] : nested;
      }
      const text = normalizeText(value);
      if (!text) return [];
      const urlMatches = text.match(/(?:https?:\/\/|www\.|youtube\.com|youtu\.be|vimeo\.com)[^\s<>"')]+/gi);
      return urlMatches?.length ? urlMatches : [text];
    }

    function normalizeResourceUrl(url) {
      const text = normalizeText(url);
      if (!text) return "";
      if (/^data:/i.test(text) || /^https?:\/\//i.test(text)) return text;
      if (/^(www\.|youtube\.com|youtu\.be|vimeo\.com)/i.test(text)) return `https://${text}`;
      return text;
    }

    function urlList(...values) {
      return uniqueValues(values.flatMap(collectResourceValues).map(normalizeResourceUrl))
        .filter((url) => /^https?:\/\//i.test(url) || /^data:/i.test(url));
    }

    function isPdfUrl(url) {
      return /\.pdf(?:[?#]|$)/i.test(url) || /^data:application\/pdf/i.test(url) || /drive\.google\.com/i.test(url);
    }

    function isImageUrl(url) {
      return /^data:image\//i.test(url) || /\.(jpe?g|png|webp|gif|avif)(?:[?#]|$)/i.test(url);
    }

    function isDirectVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov)(?:[?#]|$)/i.test(url);
    }

    function isVideoUrl(url) {
      return isDirectVideoUrl(url) || /youtube\.com\/watch\?/i.test(url) || /youtube\.com\/embed\//i.test(url) || /youtu\.be\//i.test(url) || /vimeo\.com\//i.test(url);
    }

    function toEmbedUrl(url) {
      const text = normalizeText(url);
      const youtubeWatch = text.match(/[?&]v=([^&]+)/i);
      if (/youtube\.com\/watch\?/i.test(text) && youtubeWatch?.[1]) return `https://www.youtube.com/embed/${youtubeWatch[1]}`;
      const youtuBe = text.match(/youtu\.be\/([^?&]+)/i);
      if (youtuBe?.[1]) return `https://www.youtube.com/embed/${youtuBe[1]}`;
      if (/youtube\.com\/embed\//i.test(text)) return text;
      const vimeoMatch = text.match(/vimeo\.com\/(\d+)/i);
      if (vimeoMatch?.[1]) return `https://player.vimeo.com/video/${vimeoMatch[1]}`;
      return "";
    }

    function documentType(url) {
      if (isPdfUrl(url)) return "PDF";
      const extension = url.split(/[?#]/)[0]?.split(".").pop()?.toUpperCase();
      return extension && extension.length <= 5 ? extension : "DOC";
    }

    function offeringKind(match) {
      const text = [match.offering_group, match.offering_category, match.offering_type].map((value) => normalizeText(value).toLowerCase()).join(" ");
      if (text.includes("knowledge") || text.includes("manual") || text.includes("video") || text.includes("sop") || text.includes("blog")) return "knowledge";
      if (text.includes("product") || text.includes("machinery") || text.includes("plant setup") || text.includes("raw material")) return "product";
      return "service";
    }

    function rowsOf(rows) {
      return rows.map(([label, value]) => ({ label, value: formatValue(value) })).filter((row) => row.value);
    }

    function chipList(match, kind) {
      return uniqueValues([
        kind === "product" ? "Product offering" : kind === "knowledge" ? "Knowledge offering" : "Service offering",
        match.offering_type,
        match.domain_6m ? `${match.domain_6m} - 6M` : "",
        match.primary_valuechain,
        match.primary_application
      ]).slice(0, 6);
    }

    function buildDocuments(match, kind) {
      const payload = getPayload(match);
      const values = [
        kind === "service" ? match.service_brochure_url : "",
        kind === "product" ? match.product_brochure_url : "",
        kind === "knowledge" ? match.knowledge_content_url : "",
        kind === "service" ? payload["Service offering Brochure"] : "",
        kind === "product" ? payload["Product Brochure"] : "",
        kind === "knowledge" ? payload["Knowledge Offering Content"] : "",
        payload.brochure,
        payload.brochure_url,
        payload.document,
        payload.document_url,
        payload.documentLink,
        payload.documentLinks,
        payload.documents,
        payload.document_urls,
        payload.attachmentUrls,
        payload.attachments
      ];
      return urlList(...values)
        .filter((url) => !isImageUrl(url) && !isVideoUrl(url))
        .map((url, index) => ({
          title: index === 0 ? (kind === "knowledge" ? "Knowledge guide" : kind === "service" ? "Service brochure" : "Product brochure") : `Resource ${index + 1}`,
          url,
          typeLabel: documentType(url)
        }));
    }

    function buildMedia(match) {
      const payload = getPayload(match);
      const primaryImage = match.solution?.solution_image_url || payload.SolutionImage || payload.solutionImage;
      const images = urlList(primaryImage, payload.OfferingImage, payload.offering_image, payload.galleryUrls, payload.imageUrls, payload.images, payload.product_gallery_urls).filter(isImageUrl);
      const links = urlList(
        match.knowledge_content_url,
        payload["Knowledge Offering Content"],
        payload.knowledge_content,
        payload.knowledgeContent,
        payload.video,
        payload.video_url,
        payload.Video,
        payload.VideoUrl,
        payload["Video Link"],
        payload["Video URL"],
        payload.videoUrls,
        payload.videos,
        payload.product_video_urls
      );
      const media = [];
      images.forEach((url, index) => media.push({ title: index === 0 ? normalizeText(match.offering_name) || "Offering image" : `Image ${index + 1}`, url, kind: "image" }));
      links.forEach((url, index) => {
        if (isPdfUrl(url) || isImageUrl(url)) return;
        media.push({
          title: index === 0 ? normalizeText(match.offering_name) || "Offering media" : `Media ${index + 1}`,
          url,
          kind: isVideoUrl(url) ? "video" : "external",
          embedUrl: isDirectVideoUrl(url) ? "" : toEmbedUrl(url)
        });
      });
      return media;
    }

    function buildQuickCards(match, kind, providerName, documents, media) {
      if (kind === "product") {
        return rowsOf([
          ["Capacity / Grade", match.grade_capacity || match.grade_or_capacity || match.capacity || "To be discussed"],
          ["Product cost", match.product_cost || match.cost_remarks || "Quote after scope"],
          ["Lead time", match.lead_time || "To be discussed"],
          ["Support", match.support_details || "To be discussed"],
          ["Audience", match.audience || "Groups, individuals, organisations, SHGs"]
        ]);
      }
      if (kind === "knowledge") {
        const format = [
          media.some((item) => item.kind === "video") ? "Video" : "",
          documents.length ? "PDF" : "",
          media.some((item) => item.kind === "image") ? "Images" : ""
        ].filter(Boolean).join(" + ") || "Content";
        return rowsOf([
          ["Format", format],
          ["Value chain", match.primary_valuechain],
          ["Applications", match.applications || match.primary_application],
          ["Best for", match.primary_application || match.tags],
          ["Provider", providerName]
        ]);
      }
      return rowsOf([
        ["Duration", match.duration || "To be discussed"],
        ["Service cost", match.service_cost || match.cost_remarks || "Quote after scope"],
        ["Languages", match.languages],
        ["Delivery mode", match.delivery_mode || match.location_availability],
        ["Certification", match.certification_offered || "To be discussed"],
        ["Support", match.support_post_service || match.support_details || "At service location"]
      ]);
    }

    function summaryBullets(match, kind) {
      const source = normalizeText(match.solution?.about_solution_text || match.about_offering_text);
      const parts = source.split(/(?<=[.!?])\s+/).map((part) => part.trim()).filter(Boolean).slice(0, kind === "knowledge" ? 4 : 3);
      if (parts.length) return parts;
      if (kind === "product") return ["Helps evaluate the product quickly for deployment decisions."];
      if (kind === "knowledge") return ["Helps understand the practice, process, or knowledge resource."];
      return ["Helps evaluate the service, training, or advisory support."];
    }

    function renderRows(rows) {
      if (!rows?.length) return "";
      return `<div class="offering-detail-rows">${rows.map((row) => `<div class="offering-detail-row"><span>${esc(row.label)}</span><strong>${isLinkValue(row.value) ? `<a href="${esc(row.value)}" target="_blank" rel="noreferrer">${esc(row.value)}</a>` : esc(row.value)}</strong></div>`).join("")}</div>`;
    }

    function renderDocuments(documents) {
      if (!documents?.length) return "";
      return `<div class="offering-document-grid">${documents.map((doc) => `<a class="offering-document-card" href="${esc(doc.url)}" target="_blank" rel="noreferrer"><span class="offering-document-icon">${esc(doc.typeLabel)}</span><span><strong>${esc(doc.title)}</strong><small>${esc(doc.typeLabel)} resource</small></span><strong>Open</strong></a>`).join("")}</div>`;
    }

    function renderMedia(media) {
      if (!media?.length) return "";
      return `<div class="offering-media-grid">${media.map((item) => {
        if (item.kind === "image") return `<a class="offering-media-card" href="${esc(item.url)}" target="_blank" rel="noreferrer"><img src="${esc(item.url)}" alt="${esc(item.title)}" referrerpolicy="no-referrer" /><strong>${esc(item.title)}</strong></a>`;
        if (item.kind === "video" && item.embedUrl) return `<div class="offering-media-card"><iframe src="${esc(item.embedUrl)}" title="${esc(item.title)}" allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><strong>${esc(item.title)}</strong></div>`;
        if (item.kind === "video") return `<div class="offering-media-card"><video controls preload="metadata"><source src="${esc(item.url)}" /></video><strong>${esc(item.title)}</strong></div>`;
        return `<a class="offering-document-card" href="${esc(item.url)}" target="_blank" rel="noreferrer"><span class="offering-document-icon">EXT</span><span><strong>${esc(item.title)}</strong><small>External media</small></span><strong>Open</strong></a>`;
      }).join("")}</div>`;
    }

    function buildTabs(match, kind, providerRows, documents, media) {
      const commonRows = rowsOf([
        ["Offering category", match.offering_category],
        ["Offering group", match.offering_group],
        ["Offering type", match.offering_type],
        ["6M domain", match.domain_6m],
        ["Primary value chain", match.primary_valuechain],
        ["Primary application", match.primary_application],
        ["All value chains", parseArray(match.valuechains)],
        ["All applications", parseArray(match.applications)],
        ["Tags", parseArray(match.tags)],
        ["Languages", parseArray(match.languages)],
        ["Geography", parseArray(match.geographies)],
        ["Location availability", match.location_availability],
        ["Audience", match.audience]
      ]);
      if (kind === "product") {
        return [
          { id: "overview", label: "Overview", intro: match.about_offering_text || match.solution?.about_solution_text, rows: commonRows, cards: summaryBullets(match, kind).map((body, index) => ({ title: index === 0 ? "Product use case" : `Decision point ${index + 1}`, body })) },
          { id: "specs", label: "Specs", rows: rowsOf([["Capacity / Grade", match.grade_capacity], ["Product cost", match.product_cost], ["Lead time", match.lead_time], ["Support details", match.support_details], ["Cost remarks", match.cost_remarks]]) },
          { id: "deployment", label: "Deployment", rows: rowsOf([["Geography", parseArray(match.geographies)], ["Location availability", match.location_availability], ["Audience", match.audience], ["Contact details", match.preferred_contact_details || match.contact_details]]) },
          { id: "documents", label: "Documents", documents, media: media.filter((item) => item.kind === "image"), note: documents.length ? "" : "No documents added." },
          { id: "provider", label: "Provider", rows: providerRows }
        ];
      }
      if (kind === "knowledge") {
        return [
          { id: "overview", label: "Overview", intro: match.about_offering_text || match.solution?.about_solution_text, rows: commonRows, cards: summaryBullets(match, kind).map((body, index) => ({ title: index === 0 ? "What you will learn" : `Learning point ${index + 1}`, body })) },
          { id: "media", label: "Media", media, documents, note: !media.length && !documents.length ? "No media resources added." : "" },
          { id: "step-by-step", label: "Step-by-step", cards: summaryBullets(match, kind).map((body, index) => ({ title: `Step ${index + 1}`, body })) },
          { id: "downloads", label: "Downloads", documents, note: documents.length ? "" : "No downloadable guides added." },
          { id: "provider", label: "Provider", rows: providerRows }
        ];
      }
      return [
        { id: "overview", label: "Overview", intro: match.about_offering_text || match.solution?.about_solution_text, rows: commonRows, cards: summaryBullets(match, kind).map((body, index) => ({ title: index === 0 ? "Service use case" : `Outcome ${index + 1}`, body })) },
        { id: "training-format", label: "Training format", rows: rowsOf([["Trainer", match.trainer_name], ["Trainer details", match.trainer_details_text], ["Duration", match.duration], ["Delivery mode", match.delivery_mode], ["Training venue", match.geographies || match.location_availability], ["Languages", match.languages]]) },
        { id: "costs", label: "Costs", rows: rowsOf([["Service cost", match.service_cost], ["Cost remarks", match.cost_remarks], ["Support post service", match.support_post_service], ["Support post service cost", match.support_post_service_cost]]) },
        { id: "eligibility", label: "Eligibility", rows: rowsOf([["Prerequisites", match.prerequisites], ["Certification offered", match.certification_offered], ["Audience", match.audience], ["Contact details", match.preferred_contact_details || match.contact_details]]), documents, media },
        { id: "provider", label: "Provider", rows: providerRows }
      ];
    }

    function renderTabs(tabs) {
      const first = tabs[0]?.id || "overview";
      return `<section class="offering-tabs-card" id="offering-detail-tabs">
        <div class="offering-tab-list" role="tablist" aria-label="Offering detail sections">
          ${tabs.map((tab) => `<button class="offering-tab-button ${tab.id === first ? "active" : ""}" type="button" role="tab" aria-selected="${tab.id === first ? "true" : "false"}" data-tab="${esc(tab.id)}">${esc(tab.label)}</button>`).join("")}
        </div>
        ${tabs.map((tab) => `<div class="offering-tab-panel" data-panel="${esc(tab.id)}" ${tab.id === first ? "" : "hidden"}>
          ${tab.intro ? `<p class="section-copy">${esc(tab.intro)}</p>` : ""}
          ${tab.cards?.length ? `<div class="offering-tab-card-grid">${tab.cards.map((card) => `<article class="offering-tab-info-card"><h3>${esc(card.title)}</h3><p>${esc(card.body)}</p></article>`).join("")}</div>` : ""}
          ${renderRows(tab.rows)}
          ${renderMedia(tab.media)}
          ${renderDocuments(tab.documents)}
          ${tab.note ? `<div class="offering-note">${esc(tab.note)}</div>` : ""}
        </div>`).join("")}
      </section>`;
    }

    function wireTabs() {
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          const tab = button.getAttribute("data-tab");
          document.querySelectorAll("[data-tab]").forEach((item) => {
            const active = item.getAttribute("data-tab") === tab;
            item.classList.toggle("active", active);
            item.setAttribute("aria-selected", active ? "true" : "false");
          });
          document.querySelectorAll("[data-panel]").forEach((panel) => {
            panel.hidden = panel.getAttribute("data-panel") !== tab;
          });
        });
      });
    }

    function renderDetail(match) {
      const offeringName = normalizeText(match.offering_name || match.solution?.solution_name || "Unnamed offering");
      const heroCopy = normalizeText(match.about_offering_text || match.solution?.about_solution_text || "No description is available for this offering yet.");
      const greHref = normalizeText(match.gre_link || "");
      const kind = offeringKind(match);
      const providerRows = buildProviderRows(match).map(([label, value]) => ({ label, value: formatValue(value) }));
      const providerName = providerRows.find((row) => row.label === "Provider")?.value || "Solution Provider";
      const providerEmail = providerRows.find((row) => row.label === "Email")?.value || "";
      const documents = buildDocuments(match, kind);
      const media = buildMedia(match);
      const quickCards = buildQuickCards(match, kind, providerName, documents, media);
      const tabs = buildTabs(match, kind, providerRows, documents, media);
      const chips = chipList(match, kind);
      const primaryDoc = documents[0];
      const primaryImage = media.find((item) => item.kind === "image");
      const featured = media.find((item) => item.kind === "video" || item.kind === "external");
      const hasHeroMedia = Boolean(primaryDoc || primaryImage);
      const knowledgeContentUrl = kind === "knowledge" ? (primaryDoc?.url || media.find((item) => item.kind === "external")?.url || "") : "";
      const summaryTitle = kind === "product" ? "What this product helps with" : kind === "knowledge" ? "What you will learn" : "What this service helps with";
      const snapshotTitle = kind === "product" ? "Provider snapshot" : kind === "knowledge" ? "Knowledge source snapshot" : "Trainer & provider snapshot";

      document.body.classList.toggle("embedded-offering-detail", isEmbedded);
      mount.className = "";
      mount.innerHTML = `
        <section class="offering-action-hero offering-${esc(kind)}${hasHeroMedia ? "" : " offering-hero-no-media"}">
          <div class="offering-hero-copy">
            <div class="offering-hero-topbar">
              <p class="offering-page-kicker">${kind === "product" ? "Product Offering View" : kind === "knowledge" ? "Knowledge Offering View" : "Service Offering View"}</p>
              ${isEmbedded ? "" : `<a class="offering-hero-back" href="./">Back to Search</a>`}
            </div>
              <h1>${esc(offeringName)}</h1>
              <p>${esc(heroCopy)}</p>
              <div class="offering-chip-row">${chips.map((chip) => `<span>${esc(chip)}</span>`).join("")}</div>
            </div>
          ${hasHeroMedia ? `<div class="offering-hero-media">
            ${primaryImage ? `<figure class="offering-hero-image-card"><img src="${esc(primaryImage.url)}" alt="${esc(primaryImage.title || offeringName)}" referrerpolicy="no-referrer" /><figcaption>${esc(primaryImage.title || offeringName)}</figcaption></figure>` : ""}
            ${primaryDoc ? `<a class="offering-hero-doc-card" href="${esc(primaryDoc.url)}" target="_blank" rel="noreferrer"><span>${esc(primaryDoc.typeLabel)}</span><strong>${esc(primaryDoc.title)}</strong><small>Open resource</small></a>` : ""}
          </div>
          ` : ""}
          <div class="offering-hero-actions" aria-label="Offering actions">
            ${providerEmail ? `<a class="offering-cta offering-cta-primary" href="mailto:${esc(providerEmail)}">Email Provider</a>` : `<span class="offering-cta offering-cta-secondary">Email unavailable</span>`}
            ${kind === "knowledge" ? `<a class="offering-cta offering-cta-soft" href="${esc(knowledgeContentUrl || "#offering-detail-tabs")}" ${knowledgeContentUrl ? `target="_blank" rel="noreferrer"` : ""}>${knowledgeContentUrl ? "View content" : "Read overview"}</a>` : ""}
            ${primaryDoc ? `<a class="offering-cta offering-cta-soft" href="${esc(primaryDoc.url)}" target="_blank" rel="noreferrer">${kind === "knowledge" ? "Download guide" : "Download brochure"}</a>` : ""}
            ${greHref ? `<a class="offering-cta offering-cta-outline" href="${esc(greHref)}" target="_blank" rel="noreferrer">View on GRE</a>` : ""}
          </div>
        </section>
        ${featured || documents.length || media.filter((item) => item.kind === "image").length ? `<section class="offering-featured-media" id="media">
          <div><p class="offering-section-kicker">Embedded content and resources</p><h2>Media and documents</h2></div>
          <div class="offering-featured-media-grid">
            ${featured ? `<div class="offering-featured-player">${featured.kind === "video" && featured.embedUrl ? `<iframe src="${esc(featured.embedUrl)}" title="${esc(featured.title)}" allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>` : featured.kind === "video" ? `<video controls preload="metadata"><source src="${esc(featured.url)}" /></video>` : `<a class="offering-external-media-card" href="${esc(featured.url)}" target="_blank" rel="noreferrer"><span>External content</span><strong>${esc(featured.title || offeringName)}</strong><small>Open video or learning page</small></a>`}</div>` : ""}
            <div class="offering-featured-resource-list">
              ${documents.map((doc) => `<a class="offering-featured-resource" href="${esc(doc.url)}" target="_blank" rel="noreferrer"><span>${esc(doc.typeLabel)}</span><strong>${esc(doc.title)}</strong><small>Open resource</small></a>`).join("")}
              ${media.filter((item) => item.kind === "image").slice(0, 4).map((image) => `<a class="offering-featured-resource offering-featured-image-link" href="${esc(image.url)}" target="_blank" rel="noreferrer"><img src="${esc(image.url)}" alt="${esc(image.title)}" referrerpolicy="no-referrer" /><strong>${esc(image.title)}</strong></a>`).join("")}
            </div>
          </div>
        </section>` : ""}
        <section class="offering-quick-grid">${quickCards.map((card) => `<article class="offering-quick-card"><span>${esc(card.label)}</span><strong>${esc(card.value)}</strong></article>`).join("")}</section>
        <section class="offering-summary-grid">
          <section class="offering-summary-card"><h2>${esc(summaryTitle)}</h2><div class="offering-help-list">${summaryBullets(match, kind).map((bullet) => `<div><span>OK</span><p>${esc(bullet)}</p></div>`).join("")}</div></section>
          <section class="offering-summary-card"><h2>${esc(snapshotTitle)}</h2><div class="offering-snapshot-rows">${providerRows.slice(0, 7).map((row) => `<div><span>${esc(row.label)}</span><strong>${isLinkValue(row.value) ? `<a href="${esc(row.value)}" target="_blank" rel="noreferrer">${esc(row.value)}</a>` : esc(row.value)}</strong></div>`).join("")}</div></section>
        </section>
        ${renderTabs(tabs)}
        ${isEmbedded ? "" : `<div class="page-bottom-actions">
          <a class="btn hero-link" href="./">Back to Search</a>
        </div>`}
      `;
      wireTabs();
    }

    async function loadFromSupabase() {
      if (!APP_CONFIG.SUPABASE_URL || !APP_CONFIG.SUPABASE_ANON_KEY || !window.supabase?.createClient) {
        throw new Error("Supabase is not configured.");
      }
      const client = window.supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_ANON_KEY);
      const { data: offering, error } = await client.from("offerings").select("*").eq("offering_id", offeringId).maybeSingle();
      if (error) throw new Error(error.message);
      if (!offering) throw new Error("Offering not found.");

      const [traderRes, solutionRes] = await Promise.all([
        offering.trader_id ? client.from("traders").select("*").eq("trader_id", offering.trader_id).maybeSingle() : Promise.resolve({ data: null }),
        offering.solution_id ? client.from("solutions").select("*").eq("solution_id", offering.solution_id).maybeSingle() : Promise.resolve({ data: null }),
      ]);

      return {
        ...offering,
        trader: traderRes.data || null,
        solution: solutionRes.data || null,
      };
    }

    async function init() {
      if (!offeringId) {
        mount.className = "hero empty";
        mount.textContent = "No offering id was provided.";
        return;
      }

      try {
        const cached = sessionStorage.getItem(`gre-match-${offeringId}`);
        if (cached) {
          renderDetail(JSON.parse(cached));
          return;
        }
      } catch {}

      try {
        const match = await loadFromSupabase();
        renderDetail(match);
      } catch (error) {
        mount.className = "hero empty";
        mount.textContent = error.message || "Could not load offering details.";
      }
    }

    init();
  </script>
</body>
</html>
